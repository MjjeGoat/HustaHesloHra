name: Build and Deploy

on:
  push:
    branches:
      - main   # nebo hlavní branch tvého repozitáře
  workflow_dispatch:      # umožní manuální spuštění

jobs:
  # -----------------------------
  # JOB 1: Build
  # -----------------------------
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v3

      # Pokud máš Node projekt, build krok by mohl vypadat takto:
      - name: Set up Node.js
        uses: actions/setup-node@v3
        with:
          node-version: '20'  # verze Node.js

      - name: Install dependencies
        run: npm install

      - name: Build project
        run: npm run build   # přizpůsob podle tvého buildu

      - name: Upload build artifacts
        uses: actions/upload-artifact@v3
        with:
          name: build
          path: build/       # složka s výsledkem buildu

  # -----------------------------
  # JOB 2: Deploy
  # -----------------------------
  deploy:
    needs: build
    runs-on: ubuntu-latest
    permissions:
      contents: read
      pages: write
      id-token: write
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Checkout repository
        uses: actions/checkout@v3

      - name: Download build artifacts
        uses: actions/download-artifact@v3
        with:
          name: build
          path: build/

      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4